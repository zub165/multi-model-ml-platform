# Snippet: add to an existing HTTPS server block (e.g. api.docsoncalls.com).
# Proxies https://api.docsoncalls.com/ml/* -> http://127.0.0.1:8890/*
# Install: merge into /etc/nginx/sites-available/<your-site>, then:
#   sudo nginx -t && sudo systemctl reload nginx

    location = /ml {
        return 301 https://$host/ml/;
    }

    location /ml/ {
        proxy_pass http://127.0.0.1:8890/;
        proxy_http_version 1.1;

        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        client_max_body_size 50M;
    }
