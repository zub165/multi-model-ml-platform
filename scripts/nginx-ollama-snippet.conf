# Snippet: HTTPS Ollama behind nginx (same host as ML API).
# Proxies https://api.docsoncalls.com/ollama/* -> http://127.0.0.1:11434/*
#
# Ollama returns 403 if Host is the public API name; use Host 127.0.0.1:11434 upstream.
# Browser Origin (e.g. GitHub Pages) is still forwarded; set OLLAMA_ORIGINS on the Ollama service.
#
#   sudo nginx -t && sudo systemctl reload nginx

    location = /ollama {
        return 301 https://$host/ollama/;
    }

    location /ollama/ {
        proxy_pass http://127.0.0.1:11434/;
        proxy_http_version 1.1;

        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        send_timeout 600s;
        proxy_buffering off;

        proxy_set_header Host 127.0.0.1:11434;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        client_max_body_size 100M;
    }
